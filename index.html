<!DOCTYPE html>
<html lang="it">
<head>
  <script>
  window.location.href = 'https://wpremio.weebly.com';
  </script>
  <!-- Add favicon links -->
  <link rel="icon" type="image/x-icon" href="/Favicon/favicon.ico">
  <link rel="icon" type="image/png" href="/Favicon/favicon.png">
  <link rel="apple-touch-icon" href="/Favicon/apple-touch-icon.png">  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Homepage</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1000px;
      margin: 40px auto;
      padding: 20px;
      box-sizing: border-box;
    }

    h1 {
      font-size: 64px;
      text-align: left;
      margin: 24px 0 40px;
    }

    /* Image styling */
    .header-image {
      width: 100%;
      max-width: 600px;
      height: auto;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 30px;
    }

    /* Contenitore responsive per iframe (4:3) */
    .embed-container {
      position: relative;
      width: 100%;
      padding-bottom: 56.25%; /* 4:3 ratio */
      height: 0;
      overflow: hidden;
      background: #f2f2f2;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      margin-bottom: 10px;
    }
    .embed-container iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }

    /* Lazy-load placeholder (click to load) */
    .embed-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: linear-gradient(90deg, rgba(0,0,0,0.03), rgba(0,0,0,0.02));
      cursor: pointer;
    }
    .embed-placeholder .btn {
      background: #ff4b2b;
      color: white;
      padding: 10px 18px;
      border-radius: 6px;
      font-weight: 600;
    }
    .caption {
      margin: 8px 0 18px;
      color: #444;
      font-size: 14px;
    }

    /* Redirect button styling - Normal */
    .redirect-btn {
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>Sito di wpremio</h1>
  <img src="https://raw.githubusercontent.com/wpremio/wpremio.github.io/9979eb11fdc4625b9b3803f5567f2bea843995eb/1352172534_480x360.png" alt="Caricamento..." class="header-image">

 
  <!-- Esempio: Pagina esterna (sandbox) -->
  <div class="embed-container" aria-label="Sito esterno embed">
    <iframe
      src="https://scratch.mit.edu/projects/1332963853/embed"
      title="Caricamento..."
      sandbox="allow-same-origin allow-scripts allow-forms allow-popups"
      loading="lazy"></iframe>
  </div>
  <p class="caption">Progetto suggerito 😉</p>
  
  <!-- Redirect button -->
  <a href="https://youareanidiot.cc" class="redirect-btn">f4f gratis da griffpatch!</a>
    
  </script>
</body>
</html>
